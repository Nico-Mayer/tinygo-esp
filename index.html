<!doctype html>
<html>
    <head>
        <title>ESP32 TinyGo Server</title>
        <style>
            body {
                font-family: Arial;
                margin: 20px;
            }
            h1 {
                color: #333;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                margin: 5px;
            }
        </style>
    </head>
    <body>
        <h1>ESP32 TinyGo Web Server</h1>
        <p>Welcome to the TinyGo HTTP Server!</p>

        <h2>LED Control</h2>
        <input id="color-picker" type="color" />

        <h2>About</h2>
        <p>This server is running on ESP32 with TinyGo 0.41</p>
        <p>Board: ESP32-C3 / ESP32-S3</p>

        <script>
            const picker = document.getElementById("color-picker");
            let last = 0;

            picker.addEventListener("input", throttle(set, 50));
            picker.addEventListener("change", set);

            function render(d) {
                document.getElementById("led-state").textContent = d.led;
            }

            function set() {
                const rgb = hexToRgb(picker.value);
                fetch("/set", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(rgb),
                }).catch((r) => {
                    console.log("Failed to set led value on server");
                });
            }

            function poll() {
                fetch("/status").then((r) => r.json().then(render));
            }

            function hexToRgb(hex) {
                const n = parseInt(hex.slice(1), 16);
                return {
                    r: (n >> 16) & 255,
                    g: (n >> 8) & 255,
                    b: n & 255,
                };
            }

            function throttle(fn, delay) {
                let last = 0,
                    timer;
                return function (...args) {
                    const now = Date.now();
                    const remaining = delay - (now - last);
                    if (remaining <= 0) {
                        clearTimeout(timer);
                        timer = null;
                        last = now;
                        fn.apply(this, args);
                    } else if (!timer) {
                        timer = setTimeout(() => {
                            last = Date.now();
                            timer = null;
                            fn.apply(this, args);
                        }, remaining);
                    }
                };
            }

            // setInterval(poll, 500);
            // poll();
        </script>
    </body>
</html>
