<!doctype html>
<html>
    <head>
        <title>ESP32 TinyGo Server</title>
        <style>
            body {
                font-family: Arial;
                margin: 20px;
            }
            h1 {
                color: #333;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                margin: 5px;
            }
            .on {
                background: #4caf50;
                color: white;
            }
            .off {
                background: #f44336;
                color: white;
            }
        </style>
    </head>
    <body>
        <h1>ESP32 TinyGo Web Server</h1>
        <p>Welcome to the TinyGo HTTP Server!</p>

        <h2>LED Control</h2>
        <button class="on" onclick="set('on')">LED ON</button>
        <button class="off" onclick="set('off')">LED OFF</button>

        <h3>LED State: <b id="led-state">...</b></h3>

        <h2>Status</h2>
        <button
            onclick="
                fetch('/status')
                    .then((r) => r.text())
                    .then((d) => alert(d))
            "
        >
            Check Status
        </button>

        <h2>About</h2>
        <p>This server is running on ESP32 with TinyGo 0.41</p>
        <p>Board: ESP32-C3 / ESP32-S3</p>

        <script>
            function render(d) {
                document.getElementById("led-state").textContent = d.led;
            }
            function set(x) {
                fetch("/led/" + x).then((r) => r.json().then(render));
            }
            function poll() {
                fetch("/status").then((r) => r.json().then(render));
            }
            setInterval(poll, 500);
            poll();
        </script>
    </body>
</html>
